name: Node.js CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]
    steps:
      
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Test npm registry access
        run: curl -i -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" https://idani.jfrog.io/artifactory/api/npm/davidka-gith-npm-remote/
    
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Export NPM Token
        run: echo "NPM_TOKEN=${{ secrets.NPM_TOKEN }}" >> $GITHUB_ENV

      - name: Test npm registry access
        run: npm ping --registry=https://idani.jfrog.io/artifactory/api/npm/davidka-gith-npm-remote/

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_loglevel: verbose
        
      - name: Run tests
        run: npm test
