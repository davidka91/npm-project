name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]  # Specify the Node.js version you need
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set npm Registry and Auth Token
        run: |
          echo "Setting npm registry and auth token"
          npm config set registry https://idani.jfrog.io/artifactory/api/npm/davidka-gith-npm-remote/
          npm config set //idani.jfrog.io/artifactory/api/npm/davidka-gith-npm-remote/:_authToken=${{ secrets.NPM_TOKEN }}

      - name: Check Artifactory Connectivity
        run: |
          echo "Checking connectivity to Artifactory"
          curl -i -H "Authorization: Bearer ${NPM_TOKEN}" https://idani.jfrog.io/artifactory/api/npm/davidka-gith-npm-remote/

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_loglevel: verbose
        
      - name: Run tests
        run: npm test
